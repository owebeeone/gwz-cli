name: Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout gwz-cli
        uses: actions/checkout@v4
        with:
          path: gwz-cli

      - name: Checkout gwz-core
        uses: actions/checkout@v4
        with:
          repository: owebeeone/gwz-core
          path: gwz-core

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$env:RUST_TOOLCHAIN" --profile minimal --component clippy --component rustfmt
          rustup default "$env:RUST_TOOLCHAIN"
        if: runner.os == 'Windows'

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy --component rustfmt
          rustup default "$RUST_TOOLCHAIN"
        if: runner.os != 'Windows'

      - name: Show Rust version
        run: rustc --version

      - name: Format gwz-core
        run: cargo fmt --check
        working-directory: gwz-core

      - name: Test gwz-core
        run: cargo test --locked
        working-directory: gwz-core

      - name: Clippy gwz-core
        run: cargo clippy --all-targets -- -D warnings
        working-directory: gwz-core

      - name: Format gwz-cli
        run: cargo fmt --check
        working-directory: gwz-cli

      - name: Test gwz-cli
        run: cargo test --locked
        working-directory: gwz-cli

      - name: Clippy gwz-cli
        run: cargo clippy --all-targets -- -D warnings
        working-directory: gwz-cli

  package:
    name: Package (${{ matrix.target }})
    needs: verify
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gwz
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gwz.exe
            archive: zip
    steps:
      - name: Checkout gwz-cli
        uses: actions/checkout@v4
        with:
          path: gwz-cli

      - name: Checkout gwz-core
        uses: actions/checkout@v4
        with:
          repository: owebeeone/gwz-core
          path: gwz-core

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$env:RUST_TOOLCHAIN" --profile minimal
          rustup default "$env:RUST_TOOLCHAIN"
          rustup target add "${{ matrix.target }}"
        if: runner.os == 'Windows'

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
          rustup target add "${{ matrix.target }}"
        if: runner.os != 'Windows'

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"
        working-directory: gwz-cli

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          asset="gwz-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/${asset}"
          cp "gwz-cli/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${asset}/${{ matrix.binary }}"
          cp "gwz-cli/LICENSE" "dist/${asset}/LICENSE"
          cp "gwz-cli/README.md" "dist/${asset}/README.md"
          tar -czf "dist/${asset}.${{ matrix.archive }}" -C dist "${asset}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "gwz-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$asset" | Out-Null
          Copy-Item "gwz-cli/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/$asset/${{ matrix.binary }}"
          Copy-Item "gwz-cli/LICENSE" "dist/$asset/LICENSE"
          Copy-Item "gwz-cli/README.md" "dist/$asset/README.md"
          Compress-Archive -Path "dist/$asset" -DestinationPath "dist/$asset.${{ matrix.archive }}" -Force

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: gwz-${{ matrix.target }}
          path: dist/gwz-${{ steps.version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Write checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          notes="Install by downloading the archive for your platform, extracting it, and placing the gwz binary on PATH."
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-assets/* --clobber
          else
            gh release create "${tag}" release-assets/* --title "${tag}" --notes "${notes}"
          fi
